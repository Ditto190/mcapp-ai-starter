name: Validate Repository Secrets

on:
  workflow_dispatch:

jobs:
  validate-secrets:
    runs-on: ubuntu-latest
    steps:
      - name: Check required secrets
        run: |
          missing=0
          if [ -z "${{ secrets.MCP_SERVER_URL }}" ]; then echo "MCP_SERVER_URL is missing"; missing=1; fi
          if [ -z "${{ secrets.MCP_SERVER_TOKEN }}" ]; then echo "MCP_SERVER_TOKEN is missing"; missing=1; fi
          if [ -z "${{ secrets.N8N_API_KEY }}" ]; then echo "N8N_API_KEY is missing"; missing=1; fi
          if [ -z "${{ secrets.CODESPACE_NAME }}" ]; then echo "CODESPACE_NAME is missing"; missing=1; fi
          if [ $missing -ne 0 ]; then exit 1; fi
